<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>إدارة الصلاحيات </title>
    
    <!-- Favicon (أيقونة الصفحة) بإعدادات إضافية لإجبار المتصفح على قرائتها -->
      <link rel="icon" type="image/png" href="./logo.jpg">
      <link rel="shortcut icon" href="./logo.jpg">
      <link rel="apple-touch-icon" href="./logo.jpg">
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- تخصيص ألوان Tailwind لتتناسب مع شعار سناكس (اللون الذهبي/البني) -->
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: {
                            DEFAULT: '#B08842', // اللون الذهبي المستوحى من الشعار
                            dark: '#8C6C33',    // درجة أغمق
                            light: '#CFAF75',   // درجة أفتح
                            bg: '#FDFCF9'       // خلفية مائلة للذهبي الفاتح جداً
                        }
                    }
                }
            }
        }
    </script>

    <!-- React & ReactDOM -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <!-- ExcelJS -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/exceljs/4.3.0/exceljs.min.js"></script>

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;600;700;800&display=swap" rel="stylesheet">

    <style>
        body {
            font-family: 'Cairo', sans-serif;
            background-color: #f3f4f6;
        }
        /* Custom scrollbar */
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f1f1; }
        ::-webkit-scrollbar-thumb { background: #B08842; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #8C6C33; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // Icons
        const IconAlert = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m21.73 18-8-14a2 2 0 0 0-3.48 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/><path d="M12 9v4"/><path d="M12 17h.01"/></svg>
        );
        const IconExcel = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><path d="M8 13h2"/><path d="M8 17h2"/><path d="M14 13h2"/><path d="M14 17h2"/></svg>
        );
        const IconTrash = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/></svg>
        );
        const IconPlus = () => (
            <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><line x1="12" y1="5" x2="12" y2="19"></line><line x1="5" y1="12" x2="19" y2="12"></line></svg>
        );

        function App() {
            // Load Data
            const [products, setProducts] = useState(() => {
                const savedProducts = localStorage.getItem('products_data_snacks');
                if (savedProducts) {
                    return JSON.parse(savedProducts);
                }
                return [];
            });

            // Form States (Modified for multiple dates/quantities)
            const [productName, setProductName] = useState('');
            const [productNotes, setProductNotes] = useState('');
            const [batches, setBatches] = useState([{ expiryDate: '', quantity: 1 }]);
            
            const [activeTab, setActiveTab] = useState('all');

            // Save to LocalStorage
            useEffect(() => {
                localStorage.setItem('products_data_snacks', JSON.stringify(products));
            }, [products]);

            const calculateDays = (dateString) => {
                if (!dateString) return null;
                const today = new Date();
                today.setHours(0, 0, 0, 0);
                const expDate = new Date(dateString);
                expDate.setHours(0, 0, 0, 0);
                const diffTime = expDate - today;
                return Math.ceil(diffTime / (1000 * 60 * 60 * 24));
            };

            // Handlers for dynamic batch rows
            const handleAddBatchRow = () => {
                setBatches([...batches, { expiryDate: '', quantity: 1 }]);
            };

            const handleRemoveBatchRow = (index) => {
                if(batches.length > 1){
                    const newBatches = batches.filter((_, i) => i !== index);
                    setBatches(newBatches);
                }
            };

            const handleBatchChange = (index, field, value) => {
                const newBatches = [...batches];
                newBatches[index][field] = value;
                setBatches(newBatches);
            };

            // Add Product (Handles mapping multiple batches into individual table rows)
            const handleAdd = (e) => {
                e.preventDefault();
                if (!productName || batches.some(b => !b.expiryDate)) return;

                const newItems = batches.map(batch => ({
                    id: Date.now() + Math.random(),
                    name: productName,
                    quantity: batch.quantity,
                    expiryDate: batch.expiryDate,
                    notes: productNotes
                }));

                setProducts([...products, ...newItems]);
                
                // Reset Form
                setProductName('');
                setProductNotes('');
                setBatches([{ expiryDate: '', quantity: 1 }]);
            };

            const handleDelete = (id) => {
                setProducts(products.filter(p => p.id !== id));
            };

            const formatDate = (dateString) => {
                if (!dateString) return '';
                const d = new Date(dateString);
                return `${d.getDate()}/${d.getMonth() + 1}/${d.getFullYear()}`;
            };

            // Export to Excel
            const exportToExcel = async () => {
                try {
                    const workbook = new ExcelJS.Workbook();
                    
                    // --- Sheet 1: All Products ---
                    const sheet1 = workbook.addWorksheet('جميع المنتجات');
                    sheet1.views = [{ rightToLeft: true }];
                    
                    sheet1.columns = [
                        { header: 'اسم المنتج', key: 'name', width: 25 },
                        { header: 'العدد (الكمية)', key: 'quantity', width: 15 },
                        { header: 'تاريخ الانتهاء', key: 'date', width: 20 },
                        { header: 'الأيام المتبقية للصلاحية', key: 'days', width: 30 },
                        { header: 'ملاحظات', key: 'notes', width: 35 }
                    ];

                    sheet1.getRow(1).font = { bold: true, size: 12, color: { argb: 'FFFFFFFF' } };
                    sheet1.getRow(1).fill = { type: 'pattern', pattern: 'solid', fgColor: { argb: 'FFB08842' } }; // Brand Gold Header
                    sheet1.getRow(1).alignment = { horizontal: 'center' };

                    products.forEach((p, index) => {
                        const rowNum = index + 2;
                        sheet1.addRow({
                            name: p.name,
                            quantity: p.quantity,
                            date: new Date(p.expiryDate),
                            days: { formula: `C${rowNum}-TODAY()`, result: calculateDays(p.expiryDate) },
                            notes: p.notes
                        });
                    });

                    sheet1.getColumn('quantity').alignment = { horizontal: 'center' };
                    sheet1.getColumn('date').numFmt = 'd/m/yyyy';
                    sheet1.getColumn('days').alignment = { horizontal: 'center' };

                    // Conditional Formatting
                    sheet1.addConditionalFormatting({
                        ref: `D2:D${Math.max(100, products.length + 10)}`,
                        rules: [
                            {
                                type: 'cellIs',
                                operator: 'lessThanOrEqual',
                                formulae: [40],
                                style: {
                                    fill: { type: 'pattern', pattern: 'solid', bgColor: { argb: 'FFFFC7CE' } },
                                    font: { color: { argb: 'FF9C0006' }, bold: true }
                                }
                            }
                        ]
                    });

                    // Generate File
                    const buffer = await workbook.xlsx.writeBuffer();
                    const blob = new Blob([buffer], { type: 'application/vnd.openxmlformats-officedocument.spreadsheetml.sheet' });
                    const url = window.URL.createObjectURL(blob);
                    const a = document.createElement('a');
                    a.href = url;
                    a.download = 'صلاحيات_الشركة_السورية_المصرية_سناكس.xlsx';
                    a.click();
                    window.URL.revokeObjectURL(url);

                } catch (error) {
                    console.error("Error:", error);
                    alert("حدث خطأ أثناء تصدير ملف الإكسل.");
                }
            };

            const displayedProducts = activeTab === 'all' 
                ? products 
                : products.filter(p => calculateDays(p.expiryDate) <= 40);

            return (
                <div className="flex flex-col min-h-screen bg-brand-bg">
                    {/* Top Navbar */}
                    <header className="bg-white text-gray-800 border-b-[4px] border-brand shadow-sm py-5 px-6 relative">
                        <div className="max-w-[1400px] mx-auto flex flex-col md:flex-row justify-between items-center gap-6">
                            
                            {/* مساحة فارغة لضبط التوسيط في الشاشات الكبيرة */}
                            <div className="hidden md:block w-48"></div>
                            
                            {/* الشعار واسم الصفحة في المنتصف */}
                            <div className="flex flex-col items-center justify-center gap-3">
                                <img 
                                    src="logo.jpg?v=2" 
                                    alt="شعار سناكس" 
                                    className="h-32 w-auto object-contain rounded-md drop-shadow-sm" 
                                    onError={(e) => { e.target.style.display = 'none'; }} 
                                />
                                <h1 className="text-3xl font-extrabold text-brand-dark text-center">إدارة الصلاحيات سناكس</h1>
                            </div>

                            {/* زر التصدير */}
                            <div className="w-full md:w-48 flex justify-center md:justify-end">
                                <button 
                                    onClick={exportToExcel}
                                    className="bg-brand hover:bg-brand-dark text-white px-5 py-3 rounded-xl flex items-center justify-center gap-2 font-bold transition-colors shadow-md w-full md:w-auto"
                                >
                                    <IconExcel />
                                    تصدير التقرير
                                </button>
                            </div>
                            
                        </div>
                    </header>

                    {/* Main Content */}
                    <main className="flex-1 p-6 max-w-[1400px] mx-auto w-full grid grid-cols-1 lg:grid-cols-4 gap-6">
                        
                        {/* Right Column: Add Form */}
                        <div className="lg:col-span-1">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 p-5 sticky top-6">
                                <h2 className="text-lg font-bold text-brand-dark border-b-2 border-brand/20 pb-3 mb-4">إضافة منتج للنظام</h2>
                                <form onSubmit={handleAdd} className="space-y-5">
                                    
                                    {/* Product Name */}
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">اسم المنتج <span className="text-red-500">*</span></label>
                                        <input 
                                            type="text" 
                                            required
                                            value={productName}
                                            onChange={e => setProductName(e.target.value)}
                                            className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand focus:border-brand focus:outline-none transition-all"
                                            placeholder="أدخل اسم المنتج هنا"
                                        />
                                    </div>

                                    {/* Dynamic Dates & Quantities Section */}
                                    <div className="bg-gray-50 p-4 rounded-lg border border-gray-200">
                                        <div className="flex justify-between items-center mb-3">
                                            <label className="block text-sm font-bold text-gray-700">التواريخ والكميات</label>
                                        </div>
                                        
                                        <div className="space-y-3">
                                            {batches.map((batch, index) => (
                                                <div key={index} className="flex gap-2 items-start relative pb-3 border-b border-gray-200 last:border-0 last:pb-0">
                                                    <div className="flex-1">
                                                        <div className="grid grid-cols-2 gap-2">
                                                            <div>
                                                                <label className="text-xs text-gray-500 block mb-1">الكمية/العدد</label>
                                                                <input 
                                                                    type="number" 
                                                                    min="1"
                                                                    required
                                                                    value={batch.quantity}
                                                                    onChange={e => handleBatchChange(index, 'quantity', e.target.value)}
                                                                    className="w-full border border-gray-300 rounded-lg px-2 py-1.5 focus:ring-2 focus:ring-brand focus:outline-none"
                                                                />
                                                            </div>
                                                            <div>
                                                                <label className="text-xs text-gray-500 block mb-1">الصلاحية</label>
                                                                <input 
                                                                    type="date" 
                                                                    required
                                                                    value={batch.expiryDate}
                                                                    onChange={e => handleBatchChange(index, 'expiryDate', e.target.value)}
                                                                    className="w-full border border-gray-300 rounded-lg px-2 py-1.5 text-sm focus:ring-2 focus:ring-brand focus:outline-none"
                                                                />
                                                            </div>
                                                        </div>
                                                    </div>
                                                    {batches.length > 1 && (
                                                        <button 
                                                            type="button"
                                                            onClick={() => handleRemoveBatchRow(index)}
                                                            className="text-red-400 hover:text-red-600 mt-6 p-1"
                                                            title="حذف هذا التاريخ"
                                                        >
                                                            <IconTrash />
                                                        </button>
                                                    )}
                                                </div>
                                            ))}
                                        </div>

                                        <button 
                                            type="button"
                                            onClick={handleAddBatchRow}
                                            className="w-full mt-3 flex items-center justify-center gap-1 text-sm font-semibold text-brand hover:text-brand-dark py-2 border border-brand/30 border-dashed rounded-lg hover:bg-brand/5 transition-colors"
                                        >
                                            <IconPlus /> إضافة تاريخ/دفعة أخرى لنفس المنتج
                                        </button>
                                    </div>

                                    {/* Notes */}
                                    <div>
                                        <label className="block text-sm font-bold text-gray-700 mb-1">ملاحظات إضافية</label>
                                        <textarea 
                                            rows="2"
                                            value={productNotes}
                                            onChange={e => setProductNotes(e.target.value)}
                                            className="w-full border border-gray-300 rounded-lg px-3 py-2 focus:ring-2 focus:ring-brand focus:border-brand focus:outline-none transition-all"
                                            placeholder="اختياري..."
                                        />
                                    </div>

                                    <button 
                                        type="submit" 
                                        className="w-full bg-brand hover:bg-brand-dark text-white font-bold py-3 rounded-lg transition-colors shadow-md"
                                    >
                                        حفظ وإضافة للمخزون
                                    </button>
                                </form>
                            </div>
                        </div>

                        {/* Left Column: Tables & Tabs */}
                        <div className="lg:col-span-3">
                            <div className="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
                                {/* Tabs */}
                                <div className="flex border-b bg-gray-50">
                                    <button 
                                        onClick={() => setActiveTab('all')}
                                        className={`flex-1 py-4 px-6 text-center font-bold text-sm transition-colors ${activeTab === 'all' ? 'bg-white text-brand border-b-[3px] border-brand' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}
                                    >
                                        كل المنتجات المضافة ({products.length})
                                    </button>
                                    <button 
                                        onClick={() => setActiveTab('danger')}
                                        className={`flex-1 py-4 px-6 text-center font-bold text-sm transition-colors flex items-center justify-center gap-2 ${activeTab === 'danger' ? 'bg-white text-red-600 border-b-[3px] border-red-600' : 'text-gray-500 hover:text-gray-700 hover:bg-gray-100'}`}
                                    >
                                        <IconAlert />
                                        تحذيرات الصلاحية (40 يوم أو أقل)
                                    </button>
                                </div>

                                {/* Table */}
                                <div className="overflow-x-auto">
                                    <table className="w-full text-right border-collapse">
                                        <thead>
                                            <tr className="bg-gray-50 text-gray-600 text-sm">
                                                <th className="p-4 border-b font-extrabold text-brand-dark">اسم المنتج</th>
                                                <th className="p-4 border-b font-extrabold text-brand-dark text-center">العدد</th>
                                                <th className="p-4 border-b font-extrabold text-brand-dark text-center">تاريخ الانتهاء</th>
                                                <th className="p-4 border-b font-extrabold text-brand-dark text-center">الأيام المتبقية</th>
                                                <th className="p-4 border-b font-extrabold text-brand-dark">ملاحظات</th>
                                                <th className="p-4 border-b font-extrabold text-brand-dark text-center">إجراء</th>
                                            </tr>
                                        </thead>
                                        <tbody>
                                            {displayedProducts.length === 0 ? (
                                                <tr>
                                                    <td colSpan="6" className="p-10 text-center text-gray-500 font-semibold">
                                                        لا توجد منتجات مطابقة في هذه القائمة.
                                                    </td>
                                                </tr>
                                            ) : (
                                                displayedProducts.map(p => {
                                                    const days = calculateDays(p.expiryDate);
                                                    const isDanger = days !== null && days <= 40;
                                                    
                                                    return (
                                                        <tr key={p.id} className={`border-b transition-colors ${isDanger ? 'bg-red-50 hover:bg-red-100' : 'hover:bg-brand/5'}`}>
                                                            <td className="p-4 font-bold text-gray-800">{p.name}</td>
                                                            <td className="p-4 text-center font-bold text-gray-700">
                                                                <span className="bg-gray-100 px-3 py-1 rounded-md border border-gray-200">
                                                                    {p.quantity}
                                                                </span>
                                                            </td>
                                                            <td className="p-4 text-center font-semibold text-gray-600" dir="ltr">{formatDate(p.expiryDate)}</td>
                                                            <td className="p-4 text-center">
                                                                <span className={`inline-block px-4 py-1.5 rounded-full text-sm font-bold shadow-sm ${isDanger ? 'bg-red-500 text-white' : 'bg-brand text-white'}`}>
                                                                    {days} يوم
                                                                </span>
                                                            </td>
                                                            <td className="p-4 text-gray-600 text-sm">{p.notes || '-'}</td>
                                                            <td className="p-4 text-center">
                                                                <button 
                                                                    onClick={() => handleDelete(p.id)}
                                                                    className="text-red-500 hover:text-red-700 hover:bg-red-100 p-2 rounded-full transition-colors"
                                                                    title="حذف هذا الدفعة"
                                                                >
                                                                    <IconTrash />
                                                                </button>
                                                            </td>
                                                        </tr>
                                                    )
                                                })
                                            )}
                                        </tbody>
                                    </table>
                                </div>
                            </div>
                        </div>

                    </main>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
